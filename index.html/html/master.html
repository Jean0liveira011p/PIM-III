<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel master - Prime Fitness Club</title>

  <link rel="icon" href="../img/relatorio.png">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body data-page="master">
  <header class="topo">
    <nav class="navegacao-rapida" aria-label="Navegação rápida">
      <button type="button" class="btn-menu-hamburguer" data-action="alternar-menu-rapido" aria-expanded="false" aria-controls="menu-rapido-opcoes" aria-label="Abrir menu de navegação">
      <i class="bi bi-list" aria-hidden="true"></i>
      </button>

      <div class="menu-rapido-opcoes" id="menu-rapido-opcoes" aria-hidden="true">
        <button type="button" data-href="menu.html" data-nav-page="menu">Menu</button>
        <button type="button" data-href="cadastro.html" data-nav-page="cadastro">Cadastro</button>
        <button type="button" data-href="lista.html" data-nav-page="lista">Lista</button>
        <button type="button" class="nav-master" data-href="master.html" data-nav-page="master">Master</button>
        <button type="button" class="nav-master" data-href="historico.html" data-nav-page="historico">Relatórios</button>
      </div>
    </nav>
    <h1>PRIME FITNESS CLUB</h1>
  </header>



  <button class="btn-sair" data-action="logout">
    <i class="bi bi-box-arrow-right"></i>
    <span class="tooltip-sair">SAIR DA CONTA</span>
  </button>

  <main class="container">
    <h2>Painel master</h2>

    <p id="mensagem-master" class="mensagem mensagem-master"></p>

    <div class="master-grid">
      <div class="master-card">
        <h3>Administrador</h3>
        <p id="status-admin">Carregando...</p>
        <button type="button" data-action="toggle-bloqueio-admin">
          Bloquear/desbloquear administrador
        </button>
      </div>

      <div class="master-card">
        <h3>Relatório geral</h3>
        <p>Visualizar relatório geral</p>
        <button type="button" data-href="historico.html">
          Abrir relatório geral
        </button>
      </div>

      <div class="master-card">
        <h3>Código de segurança</h3>
        <p>Alterar o código usado na recuperação de senha</p>
        <button type="button" data-href="codigo-seguranca.html">
          Alterar código
        </button>
      </div>
    </div>

    <div class="acoes">
      <button type="button" class="voltar" data-href="menu.html">Voltar</button>
    </div>
  </main>

  <dialog class="modal-saida" id="confirmacao-saida" aria-labelledby="titulo-confirmacao-saida">
    <div class="modal-saida-conteudo">
      <h2 id="titulo-confirmacao-saida">Deseja sair da conta?</h2>
      <p>Confirme se deseja encerrar sua sessão no sistema.</p>
      <div class="modal-saida-acoes">
        <button type="button" class="btn-modal-voltar" data-action="fechar-confirmacao-saida">Voltar</button>
        <button type="button" class="btn-modal-sair" data-action="confirmar-logout">Sair</button>
      </div>
    </div>
  </dialog>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <footer class="rodape-login">
    PRIME FITNESS CLUB - Seu treino começa aqui!
  </footer>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script src="../js/script.js"></script>
</body>

</html>
