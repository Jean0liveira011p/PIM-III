<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Prime Fitness Club</title>
  <link rel="icon" href="../img/relatorio.png">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body class="login-page">
  <header class="topo topo-login">
    <div class="topo-marca">
      <h1>PRIME FITNESS CLUB</h1>
    </div>
  </header>

  <main class="login-layout">
    <section class="login-esquerda">
      <div class="logo-destaque">
        <div class="logo-interativa">
          <img src="../img/logo.png" alt="Logo Prime Fitness Club" />
        </div>
      </div>
    </section>

    <section class="login-direita">
      <div class="login-box">
        <h2>ACESSO AO SISTEMA</h2>

        <form id="form-login">
          <div class="campo">
            <label for="usuario">Usuário</label>
            <div class="linha-campo linha-com-icone">
              <i class="bi bi-person-circle icone-campo" aria-hidden="true"></i>
              <input type="text" id="usuario" placeholder="Digite seu usuário" />
            </div>
          </div>

          <div class="campo campo-senha">
            <label for="senha">Senha</label>
            <div class="linha-senha linha-com-icone">
              <i class="bi bi-lock-fill icone-campo icone-cadeado" aria-hidden="true"></i>
              <input type="password" id="senha" placeholder="Digite sua senha" />
              <i class="bi bi-eye-slash olho-senha" data-action="toggle-senha" data-target="senha"></i>
            </div>
          </div>

          <p class="esqueci-senha" data-action="esqueci-senha">
            Esqueci minha senha
          </p>

          <p id="erro-login" class="mensagem mensagem-login">
            Usuário ou senha inválidos! Verifique as informações e tente novamente.
          </p>

          <div class="login-acoes">
            <button type="submit">Entrar</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <footer class="rodape-login">
    PRIME FITNESS CLUB - Seu treino começa aqui!
  </footer>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script src="../js/script.js"></script>
</body>


</html>
