<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório geral do sistema</title>

  <link rel="icon" href="../img/relatorio.png">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body class="documento-relatorio" data-page="relatorio-documento">
  <header class="documento-cabecalho no-print">
    <div>
      <h1>PRIME FITNESS CLUB</h1>
      <p>Relatório geral do sistema</p>
    </div>

    <nav class="documento-acoes" aria-label="Ações do relatório">
      <button type="button" class="btn-documento-secundario" data-href="historico.html">
        Voltar
      </button>
      <button type="button" class="btn-documento-primario btn-acao-principal" data-action="imprimir-relatorio">
        Imprimir
      </button>
    </nav>
  </header>

  <main class="documento-pagina">
    <header class="documento-titulo">
      <img src="../img/relatorio.png" alt="Ícone de relatório" class="documento-titulo-imagem" />
      <div>
        <h2>Relatório geral do sistema</h2>
        <p class="data-geracao">
          Gerado em: <span id="documentoDataGeracao">-</span>
        </p>
      </div>
    </header>

    <section class="resumo" aria-labelledby="titulo-resumo">
      <h2 id="titulo-resumo">Resumo geral</h2>
      <div class="resumo-cards">
        <article class="resumo-card">
          <i class="bi bi-currency-dollar resumo-card-icone" aria-hidden="true"></i>
          <div>
            <h3>Forma de pagamento mais utilizada</h3>
            <p id="documentoPagamento">-</p>
          </div>
        </article>

        <article class="resumo-card">
          <i class="bi bi-clipboard-data resumo-card-icone" aria-hidden="true"></i>
          <div>
            <h3>Plano com mais alunos</h3>
            <p id="documentoPlano">-</p>
          </div>
        </article>

        <article class="resumo-card">
          <i class="bi bi-person-circle resumo-card-icone" aria-hidden="true"></i>
          <div>
            <h3>Total de alunos cadastrados</h3>
            <p id="documentoTotal">0</p>
          </div>
        </article>
      </div>
    </section>

    <section class="historico-documento" aria-labelledby="titulo-historico">
      <h2 id="titulo-historico">Histórico de ações</h2>

      <table class="tabela-documento">
        <thead>
          <tr>
            <th>N°</th>
            <th>Data</th>
            <th>Ação</th>
            <th>Aluno</th>
            <th>Detalhes</th>
          </tr>
        </thead>

        <tbody id="documentoHistorico"></tbody>
      </table>
    </section>
  </main>

  <footer class="rodape-login no-print">
    PRIME FITNESS CLUB - Seu treino começa aqui!
  </footer>

  <script src="../js/script.js"></script>
</body>

</html>
