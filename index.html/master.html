<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel master - Prime Fitness Club</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body onload="
      verificarMaster();
      carregarStatusAdmin();
    ">
  <header class="topo">
    <img src="logo.png" class="logo" alt="Logo Prime Fitness" />
    <h1>PRIME FITNESS CLUB</h1>
  </header>

  <button class="btn-sair" onclick="logout()">
    <i class="bi bi-box-arrow-right"></i>
    <span class="tooltip-sair">SAIR</span>
  </button>

  <main class="container">
    <h2>Painel Master</h2>

    <p id="mensagem-master" style="
          display: none;
          text-align: center;
          font-weight: bold;
          margin-bottom: 20px;
        "></p>

    <div class="master-grid">
      <div class="master-card">
        <h3>Admin</h3>
        <p id="status-admin">Carregando...</p>
        <button type="button" onclick="toggleBloqueioAdmin()">
          Bloquear / Desbloquear Admin
        </button>
      </div>

      <div class="master-card">
        <h3>Relatório geral</h3>
        <p>Visualizar relatório geral</p>
        <button type="button" onclick="location.href = 'historico.html'">
          Abrir relatório geral
        </button>
      </div>

      <div class="master-card">
        <h3>Código de segurança</h3>
        <p>Alterar o código usado na recuperação de senha</p>
        <button type="button" onclick="location.href = 'codigo-seguranca.html'">
          Alterar código
        </button>
      </div>
    </div>

    <div class="acoes">
      <a href="menu.html">
        <button type="button" class="voltar">Voltar</button>
      </a>
    </div>
  </main>

  <script src="script.js"></script>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget("https://vlibras.gov.br/app");
  </script>
</body>

</html>
