<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histórico de alunos - Prime Fitness Club</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body onload="
      verificarMaster();
      carregarHistoricoAlunos();
      carregarGraficosRelatorio();
    ">
  <header class="topo">
    <img src="logo.png" class="logo" alt="Logo Prime Fitness" />
    <h1>PRIME FITNESS CLUB</h1>
  </header>

  <button class="btn-sair" onclick="logout()">
    <i class="bi bi-box-arrow-right"></i>
    <span class="tooltip-sair">SAIR</span>
  </button>

  <main class="container">
    <div class="topo-relatorio">
      <h2>Relatórios gerais</h2>

      <button type="button" class="voltar" onclick="location.href = 'master.html'">
        Voltar
      </button>
    </div>

    <section class="area-relatorios">
      <div class="graficos-container">
        <div class="grafico-card">
          <h4>Pagamentos por modalidade</h4>
          <div id="graficoPagamentos"></div>
        </div>

        <div class="grafico-card">
          <h4>Alunos por plano</h4>
          <div id="graficoPlanos"></div>
        </div>
      </div>

      <div class="relatorio-geral">
        <h4>Resumo geral</h4>
        <p id="relatorioPagamento">-</p>
        <p id="relatorioPlano">-</p>
        <p id="relatorioTotal">-</p>
      </div>
    </section>
    <section class="area-documento">
      <h2 class="titulo-historico-tabela">Histórico de ações no sistema</h2>

      <p class="texto-documento">
        Clique no botão abaixo para gerar um documento com as informações do
        relatório.
      </p>

      <button type="button" onclick="gerarDocumentoRelatorio()">
        Gerar documento
      </button>
    </section>
  </main>

  <script src="script.js"></script>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget("https://vlibras.gov.br/app");
  </script>
</body>

</html>
