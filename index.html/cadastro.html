<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Prime Fitness Club</title>

  <script>
    if (!localStorage.getItem("usuarioLogado")) {
      window.location.replace("login.html");
    }
  </script>

  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css" />
</head>

<body onload="verificarLogin()"></body>
<header class="topo">
  <img src="logo.png" class="logo" alt="Logo Prime Fitness" />
  <h1>PRIME FITNESS CLUB</h1>
</header>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

<button class="btn-sair" onclick="logout()">
  <i class="bi bi-box-arrow-right"></i>
  <span class="tooltip-sair">SAIR</span>
</button>

<main class="container">
  <h2>Cadastro de aluno</h2>

  <form class="form-cadastro">
    <div class="campo">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Nome do aluno" />
    </div>

    <div class="campo">
      <label for="dataNascimento">Data de nascimento</label>
      <input type="text" id="dataNascimento" maxlength="10" placeholder="dd/mm/aaaa" />
    </div>

    <div class="campo">
      <label for="telefone">Número de telefone</label>
      <input type="text" id="telefone" placeholder="(xx) xxxxx-xxxx" />
    </div>

    <div class="campo">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" />
    </div>

    <div class="campo">
      <label for="plano">Plano</label>
      <select id="plano">
        <option value="">Selecione</option>
        <option>Mensal</option>
        <option>Trimestral</option>
        <option>Semestral</option>
        <option>Anual</option>
      </select>
    </div>

    <div class="campo">
      <label for="pagamento">Forma de pagamento</label>
      <select id="pagamento">
        <option value="">Selecione</option>
        <option>Crédito</option>
        <option>Débito</option>
        <option>PIX</option>
        <option>Dinheiro</option>
      </select>
    </div>

    <div class="acoes">
      <button type="button" onclick="cadastrar()">Cadastrar</button>

      <button type="button" class="voltar" onclick="location.href = 'menu.html'">
        Voltar
      </button>
    </div>
  </form>
</main>

<script src="script.js"></script>

<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
  new window.VLibras.Widget("https://vlibras.gov.br/app");
</script>
</body>

</html>
