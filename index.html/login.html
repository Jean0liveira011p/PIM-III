<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Prime Fitness</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body class="login-page">
  <header class="topo topo-login">
    <div class="topo-marca">
      <h1>PRIME FITNESS CLUB</h1>
    </div>
  </header>

  <main class="login-layout">
    <section class="login-esquerda">
      <div class="logo-destaque">
        <div class="logo-interativa">
          <img src="logo.png" alt="Logo Prime Fitness Club" />
        </div>
      </div>
    </section>

    <section class="login-direita">
      <div class="login-box">
        <h2>ACESSO AO SISTEMA</h2>

        <form onsubmit="login(); return false;">
          <div class="campo">
            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" placeholder="Digite seu usuário" />
          </div>

          <div class="campo campo-senha">
            <label for="senha">Senha</label>
            <div class="linha-senha">
              <input type="password" id="senha" placeholder="Digite sua senha" />
              <i class="bi bi-eye-slash olho-senha" onclick="toggleSenha('senha', this)"></i>
            </div>
          </div>

          <p class="esqueci-senha" onclick="esqueciSenha()">
            Esqueci minha senha
          </p>

          <div class="login-acoes">
            <button type="submit">Entrar</button>
          </div>
        </form>

        <p id="erro-login" style="
              display: none;
              color: red;
              margin-top: 15px;
              text-align: center;
              font-weight: bold;
            ">
          Usuário ou senha inválidos! Verifique as informações e tente novamente.
        </p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget("https://vlibras.gov.br/app");
  </script>
</body>

<footer class="rodape-login">
  PRIME FITNESS CLUB - Seu treino começa aqui!
</footer>

</html>
