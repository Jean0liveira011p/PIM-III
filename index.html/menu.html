<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu - Prime Fitness Club</title>

  <link rel="icon" href="../img/relatorio.png">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body data-page="menu">
  <header class="topo">
    <img src="../img/logo.png" class="logo" alt="Logo Prime Fitness" />
    <nav class="navegacao-rapida" aria-label="Navegação rápida">
    <button type="button" class="btn-menu-hamburguer" data-action="alternar-menu-rapido" aria-expanded="false">
      <i class="bi bi-list" aria-hidden="true"></i>
      </button>

      <div class="menu-rapido-opcoes">
        <button type="button" data-href="menu.html" data-nav-page="menu">Menu</button>
        <button type="button" data-href="cadastro.html" data-nav-page="cadastro">Cadastro</button>
        <button type="button" data-href="lista.html" data-nav-page="lista">Lista</button>
        <button type="button" class="nav-master" data-href="master.html" data-nav-page="master">Master</button>
        <button type="button" class="nav-master" data-href="historico.html" data-nav-page="historico">Relatórios</button>
      </div>
    </nav>
    <h1>PRIME FITNESS CLUB</h1>
  </header>



  <button class="btn-sair" data-action="logout">
    <i class="bi bi-box-arrow-right"></i>
    <span class="tooltip-sair">SAIR DA CONTA</span>
  </button>

  <main class="container">
    <h2>ESCOLHA UMA OPÇÃO</h2>

    <div class="menu">
      <button type="button" class="card-opcao" data-href="cadastro.html">
        <img src="../img/adicionar.svg" alt="Adicionar" />
        <span>ADICIONAR</span>
        <p>Acesse para adicionar as informações do aluno.</p>
      </button>

      <button type="button" class="card-opcao" data-href="lista.html">
        <img src="../img/lista.svg" alt="Lista" />
        <span>LISTA</span>
        <p>Acesse para verificar a lista de alunos cadastrados.</p>
      </button>

      <button type="button" class="card-opcao opcao-oculta" id="opcao-master" data-href="master.html">
        <img src="../img/master.svg" alt="Master" />
        <span>MASTER</span>
        <p>Acesse para realizar o controle geral do sistema.</p>
      </button>
    </div>
  </main>

  <script src="../js/script.js"></script>

  <dialog class="modal-saida" id="confirmacao-saida" aria-labelledby="titulo-confirmacao-saida">
    <div class="modal-saida-conteudo">
      <h2 id="titulo-confirmacao-saida">Deseja sair da conta?</h2>
      <p>Confirme se deseja encerrar sua sessão no sistema.</p>
      <div class="modal-saida-acoes">
        <button type="button" class="btn-modal-voltar" data-action="fechar-confirmacao-saida">Voltar</button>
        <button type="button" class="btn-modal-sair" data-action="confirmar-logout">Sair</button>
      </div>
    </div>
  </dialog>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
</body>

</html>
