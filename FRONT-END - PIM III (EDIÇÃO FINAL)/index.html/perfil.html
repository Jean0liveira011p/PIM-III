<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil do aluno - Prime Fitness Club</title>

  <script>
    if (!localStorage.getItem("usuarioLogado")) {
      window.location.replace("login.html");
    }
  </script>

  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body onload="verificarLogin(); carregarPerfil();">
  <header class="topo">
    <img src="logo.png" class="logo" alt="Logo Prime Fitness" />
    <h1>PRIME FITNESS CLUB</h1>
  </header>

  <button class="btn-sair" onclick="logout()">
    <i class="bi bi-box-arrow-right"></i>
    <span class="tooltip-sair">SAIR</span>
  </button>

  <main class="container">
    <h2>Perfil do aluno</h2>

    <p id="mensagem-perfil" style="
          display: none;
          text-align: center;
          font-weight: bold;
          margin-bottom: 20px;
        "></p>

    <section class="perfil-card">
      <div class="perfil-topo">
        <div class="foto-area">
          <div class="foto-perfil">
            <img id="iconePadrao" src="perfil.png" alt="" />

            <img id="fotoAluno" src="" alt="Foto do aluno" />

            <div class="overlay-remover" onclick="removerFoto()">
              <i class="bi bi-trash"></i>
            </div>
          </div>

          <div class="foto-acoes">
            <label for="inputFoto" class="btn-foto">Adicionar foto</label>
            <input type="file" id="inputFoto" accept="image/*" onchange="salvarFoto()" />
          </div>
        </div>

        <div class="info-perfil">
          <div class="info-item">
            <span class="info-titulo">Nome</span>
            <span class="info-valor" id="perfilNome">-</span>
          </div>

          <div class="info-item">
            <span class="info-titulo">Data de Nascimento</span>
            <span class="info-valor" id="perfilData">-</span>
          </div>

          <div class="info-item">
            <span class="info-titulo">Telefone</span>
            <span class="info-valor" id="perfilTelefone">-</span>
          </div>

          <div class="info-item">
            <span class="info-titulo">CPF</span>
            <span class="info-valor" id="perfilCpf">-</span>
          </div>

          <div class="info-item">
            <span class="info-titulo">Plano</span>
            <span class="info-valor" id="perfilPlano">-</span>
          </div>

          <div class="info-item">
            <span class="info-titulo">Forma de Pagamento</span>
            <span class="info-valor" id="perfilPagamento">-</span>
          </div>
        </div>
      </div>
    </section>

    <div class="acoes">
      <a href="lista.html">
        <button type="button" class="voltar">Voltar</button>
      </a>
    </div>
  </main>

  <script src="script.js"></script>

  <script>
    function controlarIconePerfil() {
      const foto = document.getElementById("fotoAluno");
      const icone = document.getElementById("iconePadrao");

      if (!foto || !icone) return;

      if (foto.src && foto.src.trim() !== "" && !foto.src.endsWith("#")) {
        icone.style.display = "none";
      } else {
        icone.style.display = "flex";
      }

      foto.addEventListener("load", function () {
        if (foto.src && foto.src.trim() !== "") {
          icone.style.display = "none";
        }
      });

      foto.addEventListener("error", function () {
        icone.style.display = "flex";
      });
    }

    window.addEventListener("load", controlarIconePerfil);
  </script>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget("https://vlibras.gov.br/app");
  </script>
</body>

</html>
