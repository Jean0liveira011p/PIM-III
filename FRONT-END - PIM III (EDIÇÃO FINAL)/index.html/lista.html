<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de alunos - Prime Fitness Club</title>

  <script>
    if (!localStorage.getItem("usuarioLogado")) {
      window.location.replace("login.html");
    }
  </script>

  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>

<body onload="verificarLogin(); carregarLista();">
  <header class="topo">
    <img src="logo.png" class="logo" />
    <h1>PRIME FITNESS CLUB</h1>
  </header>

  <button class="btn-sair" onclick="logout()">
    <i class="bi bi-box-arrow-right"></i>
    <span class="tooltip-sair">SAIR</span>
  </button>

  <main class="container">
    <h2>Lista de alunos</h2>

    <div class="campo-busca-lista">
      <i class="bi bi-search icone-busca"></i>
      <input type="text" id="busca" placeholder="Pesquisar aluno pelo nome" onkeyup="buscar()" />
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Data de nascimento</th>
          <th>Telefone</th>
          <th>CPF</th>
          <th>Plano</th>
          <th>Pagamento</th>
          <th style="text-align: center">Ações</th>
        </tr>
      </thead>

      <tbody id="listaAlunos"></tbody>
    </table>

    <p id="mensagem-lista" style="
          display: none;
          text-align: center;
          font-weight: bold;
          margin-top: 20px;
        "></p>

    <div class="acoes-lista">
      <button type="button" class="voltar" onclick="location.href = 'menu.html'">
        Voltar
      </button>
    </div>
  </main>

  <script src="script.js"></script>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget("https://vlibras.gov.br/app");
  </script>
</body>

</html>
